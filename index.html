<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether — Messenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      signOut, onAuthStateChanged, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, collection, addDoc,
      onSnapshot, query, orderBy, serverTimestamp, where,
      getDocs, updateDoc, deleteDoc, limit
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─────────────────────────────────────────────────────────────────────────
    // 🔥 PASTE YOUR FIREBASE CONFIG HERE
    // ─────────────────────────────────────────────────────────────────────────
    const firebaseConfig = {

    apiKey: "AIzaSyA7vjnTbCsVoQt6yXTFtkPROGC9R8ibTiY",

    authDomain: "fir-rtc-330bd.firebaseapp.com",

    databaseURL: "https://fir-rtc-330bd-default-rtdb.firebaseio.com",

    projectId: "fir-rtc-330bd",

    storageBucket: "fir-rtc-330bd.firebasestorage.app",

    messagingSenderId: "502754099442",

    appId: "1:502754099442:web:860e0be60b0bf8816b906b",

    measurementId: "G-YSEE156DFB"

  };
    // ─────────────────────────────────────────────────────────────────────────

    const app   = initializeApp(firebaseConfig);
    const auth  = getAuth(app);
    const db    = getFirestore(app);

    // ══════════════════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════════════════
    let currentUser   = null;
    let activeContact = null;
    let msgUnsub      = null;
    let contactsUnsub = null;
    let callUnsub     = null;

    // WebRTC
    let pc          = null;
    let localStream = null;
    let callDocId   = null;
    let callTimerInterval = null;
    let callSeconds = 0;

    const servers = { iceServers: [{ urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] }] };

    // ══════════════════════════════════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════════════════════════════════
    const $ = id => document.getElementById(id);
    const initials = name => (name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
    const fmtTime = ts => ts?.toDate ? ts.toDate().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "";
    const fmtDay  = ts => {
      if (!ts?.toDate) return "";
      const d = ts.toDate(), now = new Date();
      if (d.toDateString() === now.toDateString()) return "Today";
      const y = new Date(); y.setDate(y.getDate()-1);
      if (d.toDateString() === y.toDateString()) return "Yesterday";
      return d.toLocaleDateString([],{month:"short",day:"numeric"});
    };
    const convoId = (a, b) => [a, b].sort().join("___");
    const showView = id => {
      ["view-auth","view-app"].forEach(v => $(v).classList.remove("active"));
      $(id).classList.add("active");
    };
    const toast = (msg, type="info") => {
      const t = document.createElement("div");
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add("show"), 10);
      setTimeout(() => { t.classList.remove("show"); setTimeout(()=>t.remove(),300); }, 3000);
    };

    // ══════════════════════════════════════════════════════════════════════════
    // AUTH
    // ══════════════════════════════════════════════════════════════════════════
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        $("me-name").textContent  = user.displayName || user.email;
        $("me-email").textContent = user.email;
        $("me-avatar").textContent = initials(user.displayName || user.email);
        showView("view-app");
        listenContacts();
        listenIncomingCalls();
      } else {
        currentUser = null;
        if (msgUnsub) msgUnsub();
        if (contactsUnsub) contactsUnsub();
        showView("view-auth");
      }
    });

    $("btn-login").addEventListener("click", async () => {
      const email = $("auth-email").value.trim();
      const pass  = $("auth-pass").value;
      $("auth-error").textContent = "";
      if (!email) return $("auth-error").textContent = "Email is required.";
      if (!pass)  return $("auth-error").textContent = "Password is required.";
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        console.error("Login error:", e);
        $("auth-error").textContent = friendlyError(e.code);
      }
    });

    $("btn-register").addEventListener("click", async () => {
      const name  = $("auth-name").value.trim();
      const email = $("auth-email-reg").value.trim();
      const pass  = $("auth-pass-reg").value;
      $("auth-error").textContent = "";
      if (!name)  return $("auth-error").textContent = "Display name is required.";
      if (!email) return $("auth-error").textContent = "Email is required.";
      if (!pass)  return $("auth-error").textContent = "Password is required.";
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        // Store profile in Firestore so other users can search by email
        await setDoc(doc(db, "users", cred.user.uid), {
          uid: cred.user.uid, name, email, createdAt: serverTimestamp()
        });
      } catch(e) {
        console.error("Register error:", e);
        $("auth-error").textContent = friendlyError(e.code);
      }
    });

    $("btn-logout").addEventListener("click", () => signOut(auth));

    // Tab toggle
    $("tab-login-btn").addEventListener("click",    () => switchAuthTab("login"));
    $("tab-register-btn").addEventListener("click", () => switchAuthTab("register"));
    function switchAuthTab(tab) {
      ["login","register"].forEach(t => {
        $(`tab-${t}-btn`).classList.toggle("active", t === tab);
        $(`auth-${t}-fields`).style.display = t === tab ? "flex" : "none";
      });
    }

    function friendlyError(code) {
      const map = {
        "auth/user-not-found":   "No account with that email.",
        "auth/wrong-password":   "Incorrect password.",
        "auth/email-already-in-use": "Email already registered.",
        "auth/weak-password":    "Password must be at least 6 characters.",
        "auth/invalid-email":    "Invalid email address.",
        "auth/invalid-credential": "Invalid email or password.",
      };
      return map[code] || "Something went wrong. Try again.";
    }

    // Enter key on auth — login fields
    ["auth-email", "auth-pass"].forEach(id => {
      $(id)?.addEventListener("keydown", e => {
        if (e.key === "Enter") $("btn-login").click();
      });
    });
    // Enter key on auth — register fields
    ["auth-name", "auth-email-reg", "auth-pass-reg"].forEach(id => {
      $(id)?.addEventListener("keydown", e => {
        if (e.key === "Enter") $("btn-register").click();
      });
    });

    // ══════════════════════════════════════════════════════════════════════════
    // CONTACTS
    // ══════════════════════════════════════════════════════════════════════════
    function listenContacts() {
      if (contactsUnsub) contactsUnsub();
      const ref = collection(db, "users", currentUser.uid, "contacts");
      contactsUnsub = onSnapshot(ref, snap => {
        const contacts = snap.docs.map(d => d.data());
        renderContactList(contacts);
      });
    }

    function renderContactList(contacts) {
      const list = $("contact-list");
      if (contacts.length === 0) {
        list.innerHTML = `<div class="empty-list">Add contacts to start chatting</div>`;
        return;
      }
      list.innerHTML = contacts.map(c => `
        <div class="contact-item ${activeContact?.uid === c.uid ? "active" : ""}"
             data-uid="${c.uid}" data-name="${c.name}" data-email="${c.email}">
          <div class="avatar">${initials(c.name)}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-email">${c.email}</div>
          </div>
        </div>
      `).join("");
      list.querySelectorAll(".contact-item").forEach(el => {
        el.addEventListener("click", () => {
          const { uid, name, email } = el.dataset;
          openChat({ uid, name, email });
        });
      });
    }

    // Search & add contact
    $("btn-search-user").addEventListener("click", searchUser);
    $("add-email-input").addEventListener("keydown", e => { if (e.key==="Enter") searchUser(); });

    async function searchUser() {
      const email = $("add-email-input").value.trim().toLowerCase();
      $("search-result").innerHTML = "";
      $("search-msg").textContent = "";
      if (!email) return;
      const q = query(collection(db,"users"), where("email","==",email), limit(1));
      const snap = await getDocs(q);
      if (snap.empty) { $("search-msg").textContent = "No user found."; return; }
      const user = snap.docs[0].data();
      if (user.uid === currentUser.uid) { $("search-msg").textContent = "That's you!"; return; }
      $("search-result").innerHTML = `
        <div class="result-card">
          <div class="avatar">${initials(user.name)}</div>
          <div class="result-info">
            <div class="result-name">${user.name}</div>
            <div class="result-email">${user.email}</div>
          </div>
          <button class="btn btn-accent" id="btn-add-found">Add</button>
        </div>
      `;
      $("btn-add-found").addEventListener("click", () => addContact(user));
    }

    async function addContact(user) {
      await setDoc(doc(db,"users",currentUser.uid,"contacts",user.uid), {
        uid: user.uid, name: user.name, email: user.email
      });
      // Add reverse
      await setDoc(doc(db,"users",user.uid,"contacts",currentUser.uid), {
        uid: currentUser.uid, name: currentUser.displayName, email: currentUser.email
      });
      $("search-result").innerHTML = "";
      $("add-email-input").value = "";
      $("search-msg").textContent = "✓ Added!";
      toast(`${user.name} added to contacts`, "success");
      showTab("chats");
    }

    // Sidebar tabs
    $("tab-chats").addEventListener("click", () => showTab("chats"));
    $("tab-add").addEventListener("click",   () => showTab("add"));
    function showTab(tab) {
      ["chats","add"].forEach(t => {
        $(`tab-${t}`).classList.toggle("active", t === tab);
        $(`panel-${t}`).style.display = t === tab ? "flex" : "none";
      });
    }

    // ── Mobile navigation helpers (defined early so openChat can use them) ──
    function isMobile() { return window.innerWidth <= 768; }
    function openChatMobile() {
      document.querySelector(".sidebar").classList.add("mobile-hidden");
      document.querySelector(".chat-main").classList.add("mobile-visible");
      $("btn-back").style.display = "flex";
    }
    function closeChatMobile() {
      document.querySelector(".sidebar").classList.remove("mobile-hidden");
      document.querySelector(".chat-main").classList.remove("mobile-visible");
      $("btn-back").style.display = "none";
    }

    // ══════════════════════════════════════════════════════════════════════════
    // CHAT
    // ══════════════════════════════════════════════════════════════════════════
    function openChat(contact) {
      activeContact = contact;
      // Update active state in list
      document.querySelectorAll(".contact-item").forEach(el =>
        el.classList.toggle("active", el.dataset.uid === contact.uid)
      );
      $("no-chat").style.display    = "none";
      $("chat-panel").style.display = "flex";
      $("chat-name").textContent    = contact.name;
      $("chat-avatar").textContent  = initials(contact.name);
      $("msg-input").value          = "";

      if (msgUnsub) msgUnsub();
      const cid = convoId(currentUser.uid, contact.uid);
      const ref = query(
        collection(db,"conversations",cid,"messages"),
        orderBy("ts","asc")
      );
      msgUnsub = onSnapshot(ref, snap => renderMessages(snap.docs.map(d=>({id:d.id,...d.data()}))));
      // Mobile: show chat panel, hide sidebar
      if (isMobile()) openChatMobile();
    }

    function renderMessages(msgs) {
      const box = $("messages-box");
      if (msgs.length === 0) {
        box.innerHTML = `<div class="empty-chat"><span>💬</span><p>No messages yet. Say hello!</p></div>`;
        return;
      }
      let html = "";
      let lastDay = "";
      msgs.forEach(msg => {
        const day = fmtDay(msg.ts);
        if (day !== lastDay) {
          html += `<div class="day-divider">— ${day} —</div>`;
          lastDay = day;
        }
        const mine = msg.from === currentUser.uid;
        html += `
          <div class="msg-row ${mine?"mine":"theirs"}">
            ${!mine ? `<div class="avatar sm">${initials(activeContact.name)}</div>` : ""}
            <div>
              <div class="bubble ${mine?"mine":"theirs"}">${escHtml(msg.text)}</div>
              <div class="msg-time">${fmtTime(msg.ts)}</div>
            </div>
          </div>`;
      });
      box.innerHTML = html;
      box.scrollTop = box.scrollHeight;
    }

    const escHtml = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");

    async function sendMessage() {
      const text = $("msg-input").value.trim();
      if (!text || !activeContact) return;
      $("msg-input").value = "";
      const cid = convoId(currentUser.uid, activeContact.uid);
      await addDoc(collection(db,"conversations",cid,"messages"), {
        from: currentUser.uid, text, ts: serverTimestamp()
      });
    }

    $("btn-send").addEventListener("click", sendMessage);
    $("msg-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ══════════════════════════════════════════════════════════════════════════
    // WEBRTC CALLS
    // ══════════════════════════════════════════════════════════════════════════
    $("btn-voice-call").addEventListener("click", () => startCall("voice"));
    $("btn-video-call").addEventListener("click", () => startCall("video"));
    $("btn-end-call").addEventListener("click",   endCall);
    $("btn-toggle-mic").addEventListener("click", toggleMic);
    $("btn-toggle-cam").addEventListener("click", toggleCam);
    $("btn-accept-call").addEventListener("click", acceptCall);
    $("btn-decline-call").addEventListener("click", declineCall);

    async function startCall(type) {
      if (!activeContact) return;
      showCallOverlay(type, activeContact.name, "calling");

      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === "video" }).catch(()=>null);
      if (!localStream) { toast("Could not access camera/microphone","error"); hideCallOverlay(); return; }
      if (type === "video") $("local-video").srcObject = localStream;

      pc = new RTCPeerConnection(servers);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = e => {
        const rv = $("remote-video");
        rv.srcObject = e.streams[0];
        rv.play().catch(()=>{});
      };

      // Create call doc in Firestore
      const callRef = await addDoc(collection(db,"calls"), {
        caller:   currentUser.uid,
        callee:   activeContact.uid,
        callerName: currentUser.displayName,
        type,
        status:   "calling",
        createdAt: serverTimestamp()
      });
      callDocId = callRef.id;

      // ICE candidates for caller
      pc.onicecandidate = async e => {
        if (e.candidate) await addDoc(collection(db,"calls",callDocId,"callerCandidates"), e.candidate.toJSON());
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await updateDoc(callRef, { offer: { type: offer.type, sdp: offer.sdp } });

      // Listen for answer
      callUnsub = onSnapshot(callRef, async snap => {
        const data = snap.data();
        if (!data) return;
        if (data.answer && pc.signalingState !== "stable") {
          await pc.setRemoteDescription(data.answer);
          showCallOverlay(type, activeContact.name, "active");
          startCallTimer();
        }
        if (data.status === "ended") endCallCleanup();
      });

      // Listen for callee ICE
      onSnapshot(collection(db,"calls",callDocId,"calleeCandidates"), snap => {
        snap.docChanges().forEach(change => {
          if (change.type === "added") pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
        });
      });
    }

    function listenIncomingCalls() {
      onSnapshot(
        query(collection(db,"calls"), where("callee","==",currentUser.uid), where("status","==","calling")),
        snap => {
          snap.docChanges().forEach(change => {
            if (change.type === "added") {
              const data = { id: change.doc.id, ...change.doc.data() };
              showIncomingCall(data);
            }
          });
        }
      );
    }

    let incomingCallData = null;
    function showIncomingCall(data) {
      incomingCallData = data;
      $("incoming-caller").textContent = data.callerName || "Someone";
      $("incoming-type").textContent   = data.type === "video" ? "📹 Video call" : "📞 Voice call";
      $("incoming-banner").style.display = "flex";
    }

    async function acceptCall() {
      if (!incomingCallData) return;
      const { id, type, offer } = incomingCallData;
      callDocId = id;
      $("incoming-banner").style.display = "none";

      // Find caller name for overlay
      const callerContact = document.querySelector(`[data-uid="${incomingCallData.caller}"]`);
      const callerName = incomingCallData.callerName || "Caller";
      showCallOverlay(type, callerName, "active");

      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === "video" }).catch(()=>null);
      if (!localStream) { toast("Could not access camera/microphone","error"); hideCallOverlay(); return; }
      if (type === "video") $("local-video").srcObject = localStream;

      pc = new RTCPeerConnection(servers);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = e => {
        const rv = $("remote-video");
        rv.srcObject = e.streams[0];
        rv.play().catch(()=>{});
      };

      pc.onicecandidate = async e => {
        if (e.candidate) await addDoc(collection(db,"calls",callDocId,"calleeCandidates"), e.candidate.toJSON());
      };

      await pc.setRemoteDescription(offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await updateDoc(doc(db,"calls",callDocId), { answer: { type: answer.type, sdp: answer.sdp }, status: "active" });

      // Listen for caller ICE
      onSnapshot(collection(db,"calls",callDocId,"callerCandidates"), snap => {
        snap.docChanges().forEach(change => {
          if (change.type === "added") pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
        });
      });

      callUnsub = onSnapshot(doc(db,"calls",callDocId), snap => {
        if (snap.data()?.status === "ended") endCallCleanup();
      });
      startCallTimer();
    }

    async function declineCall() {
      $("incoming-banner").style.display = "none";
      if (incomingCallData?.id) {
        await updateDoc(doc(db,"calls",incomingCallData.id), { status: "ended" });
      }
      incomingCallData = null;
    }

    async function endCall() {
      if (callDocId) await updateDoc(doc(db,"calls",callDocId), { status: "ended" }).catch(()=>{});
      endCallCleanup();
    }

    function endCallCleanup() {
      if (callUnsub) { callUnsub(); callUnsub = null; }
      if (pc) { pc.close(); pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      $("local-video").srcObject  = null;
      $("remote-video").srcObject = null;
      callDocId = null;
      stopCallTimer();
      hideCallOverlay();
    }

    function showCallOverlay(type, name, status) {
      $("call-overlay").style.display = "flex";
      $("call-with-name").textContent = name;
      $("call-status-text").textContent = status === "calling" ? "Calling…" : "Connected";
      $("call-status-text").className = status === "calling" ? "call-status pulsing" : "call-status";
      $("call-timer").style.display = status === "active" ? "block" : "none";
      // Always render video grid for video calls so elements are in DOM when tracks arrive
      if (type === "video") {
        $("video-grid").style.display = "block";
        $("remote-label").textContent = name;
      } else {
        $("video-grid").style.display = "none";
      }
      $("btn-toggle-cam").style.display = type === "video" ? "flex" : "none";
    }

    function hideCallOverlay() {
      $("call-overlay").style.display = "none";
      $("btn-toggle-mic").classList.remove("off");
      $("btn-toggle-cam").classList.remove("off");
      $("video-grid").classList.remove("swapped");
    }

    function startCallTimer() {
      callSeconds = 0;
      $("call-timer").style.display = "block";
      callTimerInterval = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds/60)).padStart(2,"0");
        const s = String(callSeconds%60).padStart(2,"0");
        $("call-timer").textContent = `${m}:${s}`;
      }, 1000);
    }

    function stopCallTimer() { clearInterval(callTimerInterval); callSeconds = 0; }

    function toggleMic() {
      if (!localStream) return;
      const track = localStream.getAudioTracks()[0];
      if (!track) return;
      track.enabled = !track.enabled;
      $("btn-toggle-mic").classList.toggle("off", !track.enabled);
      $("btn-toggle-mic").title = track.enabled ? "Mute mic" : "Unmute mic";
    }

    function toggleCam() {
      if (!localStream) return;
      const track = localStream.getVideoTracks()[0];
      if (!track) return;
      track.enabled = !track.enabled;
      $("btn-toggle-cam").classList.toggle("off", !track.enabled);
    }

    // ── PiP Swap ────────────────────────────────────────────────────────────
    $("btn-swap-video").addEventListener("click", e => {
      e.stopPropagation();
      swapVideos();
    });
    $("video-pip").addEventListener("click", e => {
      if (e.target === $("btn-swap-video")) return;
      swapVideos();
    });
    // When swapped, clicking the main box (now small) swaps back
    $("video-main").addEventListener("click", () => {
      if ($("video-grid").classList.contains("swapped")) swapVideos();
    });

    function swapVideos() {
      $("video-grid").classList.toggle("swapped");
      // Update labels to reflect who is big/small
      const isSwapped = $("video-grid").classList.contains("swapped");
      const remoteLabel = $("remote-label");
      const pipLabel    = document.querySelector("#video-pip .video-label");
      if (isSwapped) {
        remoteLabel.textContent = "You";
        pipLabel.textContent    = $("call-with-name").textContent;
      } else {
        remoteLabel.textContent = $("call-with-name").textContent;
        pipLabel.textContent    = "You";
      }
    }

    // Sidebar search filter
    $("sidebar-search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll(".contact-item").forEach(el => {
        const match = el.dataset.name.toLowerCase().includes(q) || el.dataset.email.toLowerCase().includes(q);
        el.style.display = match ? "flex" : "none";
      });
    });

    // Initial tab states
    showTab("chats");
    switchAuthTab("login");

    // Wire up back button
    $("btn-back").addEventListener("click", closeChatMobile);

  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080810;
      --surface:      #0f0f1a;
      --surface2:     #151522;
      --glass:        rgba(255,255,255,0.04);
      --glass-b:      rgba(255,255,255,0.08);
      --accent:       #6c63ff;
      --accent2:      #ff6b9d;
      --green:        #00e5a0;
      --text:         #e4e4f0;
      --muted:        #5a5a75;
      --danger:       #ff4560;
      --mono:         'DM Mono', monospace;
      --sans:         'Syne', sans-serif;
      --r:            14px;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); }

    /* ─── Views ─── */
    .view { display: none; width: 100%; height: 100%; }
    .view.active { display: flex; }

    /* ─── Auth ─── */
    #view-auth {
      align-items: center; justify-content: center; flex-direction: column; gap: 28px;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 60% at 15% 5%,  rgba(108,99,255,.15) 0%, transparent 55%),
        radial-gradient(ellipse 55% 50% at 85% 95%, rgba(255,107,157,.1) 0%, transparent 55%);
    }

    .auth-brand {
      text-align: center;
    }
    .auth-brand h1 {
      font-size: 2.8rem; font-weight: 800; letter-spacing: -2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .auth-brand p { font-family: var(--mono); font-size: .78rem; color: var(--muted); margin-top: 6px; }

    .auth-card {
      background: rgba(15,15,26,0.85);
      border: 1px solid var(--glass-b);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 36px;
      width: 420px;
      box-shadow: 0 0 80px rgba(108,99,255,.1), 0 24px 48px rgba(0,0,0,.5);
      display: flex; flex-direction: column; gap: 14px;
    }

    .auth-tabs { display: flex; gap: 4px; background: var(--glass); border-radius: 10px; padding: 4px; }
    .auth-tab-btn {
      flex: 1; padding: 8px; border-radius: 8px; border: none;
      background: none; color: var(--muted); font-family: var(--sans); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .auth-tab-btn.active { background: var(--accent); color: #fff; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-family: var(--mono); font-size: .72rem; color: var(--muted); letter-spacing: .07em; }
    .field input {
      background: var(--glass); border: 1px solid var(--glass-b);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: var(--mono); font-size: .88rem; outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }

    #auth-login-fields, #auth-register-fields { flex-direction: column; gap: 14px; }

    .btn {
      padding: 12px 18px; border-radius: 10px; border: none; cursor: pointer;
      font-family: var(--sans); font-weight: 700; font-size: .88rem;
      transition: opacity .2s, transform .15s;
    }
    .btn:hover  { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-accent   { background: linear-gradient(135deg, var(--accent), #4e46d6); color: #fff; }
    .btn-ghost    { background: var(--glass); border: 1px solid var(--glass-b); color: var(--text); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-green    { background: var(--green); color: #000; }
    .btn-icon {
      width: 38px; height: 38px; border-radius: 10px; padding: 0;
      background: var(--glass); border: 1px solid var(--glass-b); color: var(--text);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
      cursor: pointer; transition: background .2s, color .2s, border-color .2s;
    }
    .btn-icon:hover { background: rgba(108,99,255,.15); color: var(--accent); border-color: rgba(108,99,255,.3); }
    .btn-icon.off   { background: rgba(255,69,96,.12); color: var(--danger); border-color: rgba(255,69,96,.35); }

    .error-text  { font-family: var(--mono); font-size: .75rem; color: var(--danger); min-height: 1em; }

    /* ─── App Layout ─── */
    #view-app { flex-direction: row; height: 100vh; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 290px; min-width: 290px;
      background: var(--surface); border-right: 1px solid var(--glass-b);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .sidebar-top {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--glass-b);
      display: flex; flex-direction: column; gap: 12px;
    }

    .me-row {
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .82rem; color: #fff;
      position: relative;
    }
    .avatar.sm { width: 28px; height: 28px; font-size: .68rem; }
    .avatar.lg { width: 52px; height: 52px; font-size: 1.1rem; }
    .me-details { flex: 1; min-width: 0; }
    .me-details .name  { font-weight: 700; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .me-details .email { font-family: var(--mono); font-size: .68rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; padding: 4px;
      transition: color .2s; line-height: 1;
    }
    .logout-btn:hover { color: var(--danger); }

    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; padding: 9px 14px 9px 34px;
      background: var(--glass); border: 1px solid var(--glass-b);
      border-radius: 10px; color: var(--text); font-family: var(--mono);
      font-size: .8rem; outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .88rem; pointer-events: none; }

    .sidebar-tabs { display: flex; padding: 10px 12px 0; gap: 6px; }
    .sidebar-tab {
      flex: 1; padding: 7px; border-radius: 8px; border: none;
      font-family: var(--sans); font-size: .78rem; font-weight: 600;
      cursor: pointer; color: var(--muted); background: none;
      transition: background .2s, color .2s; letter-spacing: .03em;
    }
    .sidebar-tab.active { background: var(--accent); color: #fff; }

    .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .panel[style*="flex"] { display: flex; }

    /* Chats panel */
    #contact-list { flex: 1; overflow-y: auto; padding: 8px 8px; }
    #contact-list::-webkit-scrollbar { width: 3px; }
    #contact-list::-webkit-scrollbar-thumb { background: var(--glass-b); border-radius: 3px; }
    .contact-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px; border-radius: 12px; cursor: pointer;
      transition: background .15s; border: 1px solid transparent;
    }
    .contact-item:hover  { background: var(--glass); }
    .contact-item.active { background: rgba(108,99,255,.12); border-color: rgba(108,99,255,.22); }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name  { font-weight: 600; font-size: .86rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-email { font-family: var(--mono); font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-list { padding: 24px 16px; text-align: center; font-family: var(--mono); font-size: .75rem; color: var(--muted); }

    /* Add panel */
    #panel-add { padding: 16px; gap: 10px; }
    #panel-add input {
      padding: 10px 14px; background: var(--glass); border: 1px solid var(--glass-b);
      border-radius: 10px; color: var(--text); font-family: var(--mono); font-size: .85rem;
      outline: none; width: 100%; transition: border-color .2s;
    }
    #panel-add input:focus { border-color: var(--accent); }
    .result-card {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      background: var(--glass); border: 1px solid var(--glass-b); border-radius: 12px;
    }
    .result-info { flex: 1; }
    .result-name  { font-weight: 600; font-size: .86rem; }
    .result-email { font-family: var(--mono); font-size: .7rem; color: var(--muted); }
    #search-msg { font-family: var(--mono); font-size: .75rem; color: var(--muted); }

    /* ─── Main Chat ─── */
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    #no-chat {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; color: var(--muted);
    }
    #no-chat .icon { font-size: 3.5rem; opacity: .25; }
    #no-chat p { font-family: var(--mono); font-size: .8rem; }

    #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      padding: 14px 22px; border-bottom: 1px solid var(--glass-b);
      display: flex; align-items: center; gap: 12px;
      background: rgba(15,15,26,.9); backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .chat-header .hdr-name   { font-weight: 700; font-size: 1rem; }
    .chat-header .hdr-status { font-family: var(--mono); font-size: .72rem; color: var(--green); }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }

    #messages-box {
      flex: 1; overflow-y: auto; padding: 18px 22px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #messages-box::-webkit-scrollbar { width: 4px; }
    #messages-box::-webkit-scrollbar-thumb { background: var(--glass-b); border-radius: 4px; }

    .empty-chat {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    }
    .empty-chat span { font-size: 2.5rem; opacity: .25; }
    .empty-chat p    { font-family: var(--mono); font-size: .78rem; color: var(--muted); }

    .day-divider {
      text-align: center; font-family: var(--mono); font-size: .68rem;
      color: var(--muted); margin: 6px 0;
    }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.mine { flex-direction: row-reverse; }

    .bubble {
      max-width: 62%; padding: 10px 14px; border-radius: 16px;
      font-size: .86rem; line-height: 1.55; word-break: break-word;
    }
    .bubble.theirs {
      background: var(--surface2); border: 1px solid var(--glass-b);
      border-bottom-left-radius: 3px;
    }
    .bubble.mine {
      background: linear-gradient(135deg, rgba(108,99,255,.35), rgba(78,70,214,.22));
      border: 1px solid rgba(108,99,255,.3);
      border-bottom-right-radius: 3px;
    }
    .msg-time { font-family: var(--mono); font-size: .62rem; color: var(--muted); margin-top: 3px; }
    .msg-row.mine .msg-time { text-align: right; }

    .input-row {
      padding: 14px 22px; border-top: 1px solid var(--glass-b);
      display: flex; gap: 10px; align-items: flex-end;
      background: rgba(15,15,26,.9); backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: var(--glass); border: 1px solid var(--glass-b);
      border-radius: 13px; padding: 11px 16px; color: var(--text);
      font-family: var(--sans); font-size: .88rem; resize: none;
      outline: none; min-height: 42px; max-height: 130px; line-height: 1.5;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #btn-send {
      width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), #4e46d6);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1rem; transition: opacity .2s, transform .15s;
    }
    #btn-send:hover { opacity: .85; transform: scale(1.06); }

    /* ─── Call Overlay ─── */
    #call-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(4,4,12,.92); backdrop-filter: blur(24px);
      z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    }
    .call-status { font-family: var(--mono); font-size: .82rem; color: var(--muted); }
    .call-status.pulsing { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #call-with-name { font-size: 1.7rem; font-weight: 800; }
    #call-timer { font-family: var(--mono); color: var(--green); font-size: 1.1rem; }

    #video-grid {
      display: none;
      position: relative;
      width: min(820px, 92vw);
      height: min(500px, 56vh);
      border-radius: 18px;
      overflow: hidden;
    }

    /* Main (big) video fills entire grid */
    #video-main {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      overflow: hidden;
      background: #06060f;
      border: 1px solid var(--glass-b);
      transition: all .35s cubic-bezier(.4,0,.2,1);
    }
    #video-main video { width: 100%; height: 100%; object-fit: cover; }

    /* PiP (small) video floats in corner */
    .video-pip {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 28%;
      max-width: 200px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: #06060f;
      border: 2px solid rgba(255,255,255,.15);
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      cursor: pointer;
      transition: all .35s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }
    .video-pip:hover { border-color: var(--accent); transform: scale(1.03); }
    .video-pip video { width: 100%; height: 100%; object-fit: cover; }

    /* Swap button inside PiP */
    #btn-swap-video {
      position: absolute;
      top: 7px; right: 7px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      z-index: 11;
    }
    .video-pip:hover #btn-swap-video { opacity: 1; }
    #btn-swap-video:hover { transform: scale(1.15) rotate(180deg); background: var(--accent); }

    /* Swapped state — pip becomes main, main becomes pip */
    #video-grid.swapped #video-main {
      top: unset; left: unset;
      bottom: 16px; right: 16px;
      width: 28%; height: auto;
      max-width: 200px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,.15);
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      z-index: 10;
      cursor: pointer;
    }
    #video-grid.swapped #video-main:hover { border-color: var(--accent); transform: scale(1.03); }
    #video-grid.swapped .video-pip {
      top: 0; left: 0; bottom: 0; right: 0;
      width: 100%; height: 100%;
      max-width: unset;
      aspect-ratio: unset;
      border-radius: 18px;
      border: 1px solid var(--glass-b);
      box-shadow: none;
      cursor: default;
      z-index: 1;
    }
    #video-grid.swapped .video-pip:hover { transform: none; border-color: var(--glass-b); }
    /* Show swap btn always on the small box (whichever it is) */
    #video-grid.swapped #video-main:hover #btn-swap-video-main { opacity: 1; }

    .video-label {
      position: absolute; bottom: 10px; left: 12px;
      background: rgba(0,0,0,.55); padding: 3px 10px; border-radius: 99px;
      font-family: var(--mono); font-size: .68rem;
      pointer-events: none;
    }


    .call-controls { display: flex; gap: 12px; }
    .call-btn {
      width: 54px; height: 54px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; cursor: pointer; transition: transform .15s, opacity .2s;
    }
    .call-btn:hover { transform: scale(1.1); }
    #btn-end-call    { background: var(--danger); color: #fff; }
    #btn-toggle-mic  { background: var(--glass); border: 1px solid var(--glass-b); color: var(--text); }
    #btn-toggle-cam  { background: var(--glass); border: 1px solid var(--glass-b); color: var(--text); }
    #btn-toggle-mic.off, #btn-toggle-cam.off {
      background: rgba(255,69,96,.15); color: var(--danger); border-color: rgba(255,69,96,.4);
    }

    /* ─── Incoming call banner ─── */
    #incoming-banner {
      display: none; position: fixed; bottom: 22px; right: 22px; z-index: 200;
      background: var(--surface); border: 1px solid rgba(0,229,160,.25);
      border-radius: 18px; padding: 18px 22px; flex-direction: column; gap: 12px;
      box-shadow: 0 0 48px rgba(0,229,160,.1);
      animation: slideUp .3s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    #incoming-type    { font-family: var(--mono); font-size: .78rem; color: var(--muted); }
    #incoming-caller  { font-weight: 700; font-size: 1rem; }
    .incoming-actions { display: flex; gap: 10px; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--glass-b);
      padding: 10px 20px; border-radius: 99px; font-family: var(--mono); font-size: .8rem;
      opacity: 0; transition: opacity .25s, transform .25s; z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-success { border-color: rgba(0,229,160,.35); color: var(--green); }
    .toast-error   { border-color: rgba(255,69,96,.35);  color: var(--danger); }

    /* ─── Scrollbar global ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-b); border-radius: 4px; }
    /* ─── Mobile Responsive ─── */
    @media (max-width: 768px) {
      /* Ensure full viewport coverage */
      html, body { height: 100%; height: 100dvh; overflow: hidden; }

      /* Auth */
      .auth-card {
        width: calc(100vw - 32px);
        max-width: 420px;
        padding: 24px 20px;
      }
      .auth-brand h1 { font-size: 2.2rem; }

      /* App shell: fill full screen, no overflow */
      #view-app {
        flex-direction: row;
        position: fixed;
        inset: 0;
        overflow: hidden;
        width: 100vw;
        height: 100dvh;
      }

      /* Sidebar: full-width panel, sits at left */
      .sidebar {
        position: absolute;
        inset: 0;
        width: 100%;
        min-width: unset;
        height: 100%;
        border-right: none;
        z-index: 10;
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        transform: translateX(0);
        will-change: transform;
      }

      .sidebar.mobile-hidden {
        transform: translateX(-100%);
        pointer-events: none;
      }

      /* Chat main: full-width panel, starts off-screen right */
      .chat-main {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 11;
        transform: translateX(100%);
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        will-change: transform;
      }

      .chat-main.mobile-visible {
        transform: translateX(0);
      }

      /* Back button always visible on mobile */
      .back-btn {
        display: flex !important;
        flex-shrink: 0;
      }

      /* Wider bubbles */
      .bubble { max-width: 82%; }

      /* Tighter padding */
      #messages-box { padding: 14px 12px; }
      .input-row    { padding: 10px 12px; }
      .chat-header  { padding: 12px 12px; }

      /* Video grid full-width PiP on mobile */
      #video-grid {
        width: 100%;
        height: 48vh;
        border-radius: 12px;
      }
      .video-pip {
        width: 32%;
        bottom: 10px;
        right: 10px;
      }

      /* Incoming banner full-width */
      #incoming-banner {
        right: 12px;
        left: 12px;
        bottom: 14px;
      }

      /* Toast wraps on small screens */
      .toast { white-space: normal; text-align: center; width: calc(100vw - 48px); }
    }

    @media (max-width: 400px) {
      .auth-brand h1 { font-size: 1.8rem; }
      .auth-card { padding: 20px 16px; }
      .bubble { max-width: 90%; }
    }

  </style>
</head>
<body>

  <!-- ══════════════ AUTH ══════════════ -->
  <div id="view-auth" class="view">
    <div class="auth-brand">
      <h1>⬡ Aether</h1>
      <p>// encrypted · real-time · yours</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tab-login-btn">Sign In</button>
        <button class="auth-tab-btn" id="tab-register-btn">Register</button>
      </div>

      <!-- Login -->
      <div id="auth-login-fields" style="display:flex">
        <div class="field">
          <label>EMAIL</label>
          <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-accent" id="btn-login">Sign In</button>
      </div>

      <!-- Register -->
      <div id="auth-register-fields" style="display:none">
        <div class="field">
          <label>DISPLAY NAME</label>
          <input type="text" id="auth-name" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="field">
          <label>EMAIL</label>
          <input type="email" id="auth-email-reg" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="auth-pass-reg" placeholder="Min. 6 characters" autocomplete="new-password" />
        </div>
        <button class="btn btn-accent" id="btn-register">Create Account</button>
      </div>

      <div class="error-text" id="auth-error"></div>
    </div>
  </div>

  <!-- ══════════════ APP ══════════════ -->
  <div id="view-app" class="view">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="me-row">
          <div class="avatar" id="me-avatar">?</div>
          <div class="me-details">
            <div class="name"  id="me-name">—</div>
            <div class="email" id="me-email">—</div>
          </div>
          <button class="logout-btn" id="btn-logout" title="Sign out">✕</button>
        </div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="sidebar-search" placeholder="Search contacts…" />
        </div>
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tab-chats">Chats</button>
        <button class="sidebar-tab" id="tab-add">+ Add</button>
      </div>

      <!-- Chats Panel -->
      <div class="panel" id="panel-chats" style="display:flex">
        <div id="contact-list">
          <div class="empty-list">No contacts yet</div>
        </div>
      </div>

      <!-- Add Panel -->
      <div class="panel" id="panel-add">
        <input type="email" id="add-email-input" placeholder="Search by email address…" />
        <button class="btn btn-accent" id="btn-search-user">Search</button>
        <div id="search-msg"></div>
        <div id="search-result"></div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <!-- No chat selected -->
      <div id="no-chat">
        <div class="icon">⬡</div>
        <p>Select a conversation to begin</p>
      </div>

      <!-- Active chat -->
      <div id="chat-panel" style="display:none">
        <div class="chat-header">
          <button class="btn-icon back-btn" id="btn-back" title="Back" style="display:none">←</button>
          <div class="avatar" id="chat-avatar">?</div>
          <div>
            <div class="hdr-name"   id="chat-name">—</div>
            <div class="hdr-status">● online</div>
          </div>
          <div class="header-actions">
            <button class="btn-icon" id="btn-voice-call" title="Voice call">📞</button>
            <button class="btn-icon" id="btn-video-call" title="Video call">🎥</button>
          </div>
        </div>

        <div id="messages-box"></div>

        <div class="input-row">
          <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
          <button id="btn-send">➤</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ══════════════ CALL OVERLAY ══════════════ -->
  <div id="call-overlay">
    <p class="call-status" id="call-status-text">Calling…</p>
    <h2 id="call-with-name">—</h2>
    <div id="call-timer" style="display:none">00:00</div>

    <div id="video-grid">
      <!-- Big window (main) -->
      <div class="video-box" id="video-main">
        <video id="remote-video" autoplay playsinline></video>
        <div class="video-label" id="remote-label">Remote</div>
      </div>
      <!-- Small PiP window -->
      <div class="video-box video-pip" id="video-pip">
        <video id="local-video" autoplay playsinline muted></video>
        <div class="video-label">You</div>
        <button id="btn-swap-video" title="Swap windows">⇄</button>
      </div>
    </div>

    <div class="call-controls">
      <button class="call-btn" id="btn-toggle-mic" title="Toggle mic">🎙️</button>
      <button class="call-btn" id="btn-toggle-cam" title="Toggle camera" style="display:none">🎥</button>
      <button class="call-btn" id="btn-end-call"  title="End call">📵</button>
    </div>
  </div>

  <!-- ══════════════ INCOMING CALL BANNER ══════════════ -->
  <div id="incoming-banner">
    <div id="incoming-type">📞 Voice call</div>
    <div id="incoming-caller">Someone</div>
    <div class="incoming-actions">
      <button class="btn btn-green"   id="btn-accept-call">Accept</button>
      <button class="btn btn-danger"  id="btn-decline-call">Decline</button>
    </div>
  </div>

</body>
</html>
